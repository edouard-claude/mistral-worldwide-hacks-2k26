<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" shape-rendering="crispEdges">
  <!-- Background -->
  <rect width="32" height="32" fill="#cc0000"/>
  <rect x="1" y="1" width="30" height="30" fill="#990000"/>
  <rect x="2" y="2" width="28" height="28" fill="#cc0000"/>
  <!-- Hammer head (pixel art) -->
  <rect x="8" y="6" width="10" height="3" fill="#ffcc00"/>
  <rect x="7" y="7" width="1" height="2" fill="#dda800"/>
  <rect x="18" y="7" width="1" height="2" fill="#dda800"/>
  <!-- Hammer handle -->
  <rect x="12" y="9" width="2" height="10" fill="#ffcc00"/>
  <rect x="12" y="9" width="1" height="10" fill="#dda800"/>
  <!-- Sickle blade (pixel art curve) -->
  <rect x="16" y="10" width="2" height="1" fill="#ffcc00"/>
  <rect x="18" y="11" width="2" height="1" fill="#ffcc00"/>
  <rect x="20" y="12" width="2" height="1" fill="#ffcc00"/>
  <rect x="21" y="13" width="2" height="1" fill="#ffcc00"/>
  <rect x="22" y="14" width="1" height="2" fill="#ffcc00"/>
  <rect x="22" y="16" width="1" height="2" fill="#ffcc00"/>
  <rect x="21" y="18" width="1" height="2" fill="#ffcc00"/>
  <rect x="20" y="19" width="1" height="2" fill="#ffcc00"/>
  <rect x="18" y="20" width="2" height="1" fill="#ffcc00"/>
  <rect x="16" y="21" width="2" height="1" fill="#ffcc00"/>
  <rect x="14" y="21" width="2" height="1" fill="#ffcc00"/>
  <!-- Sickle inner shadow -->
  <rect x="17" y="11" width="1" height="1" fill="#dda800"/>
  <rect x="19" y="12" width="1" height="1" fill="#dda800"/>
  <rect x="20" y="13" width="1" height="1" fill="#dda800"/>
  <rect x="21" y="14" width="1" height="2" fill="#dda800"/>
  <rect x="21" y="17" width="1" height="1" fill="#dda800"/>
  <rect x="20" y="18" width="1" height="1" fill="#dda800"/>
  <rect x="19" y="19" width="1" height="1" fill="#dda800"/>
  <rect x="17" y="20" width="1" height="1" fill="#dda800"/>
  <!-- Star (pixel art, 3px) -->
  <rect x="5" y="3" width="2" height="1" fill="#ffcc00"/>
  <rect x="4" y="4" width="4" height="1" fill="#ffcc00"/>
  <rect x="5" y="5" width="2" height="1" fill="#ffcc00"/>
  <!-- Pixel border accents -->
  <rect x="0" y="0" width="32" height="1" fill="#660000"/>
  <rect x="0" y="31" width="32" height="1" fill="#660000"/>
  <rect x="0" y="0" width="1" height="32" fill="#660000"/>
  <rect x="31" y="0" width="1" height="32" fill="#660000"/>
</svg>
