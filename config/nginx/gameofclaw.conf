# GORAFI SIMULATOR — Nginx reverse proxy
# Copy to /etc/nginx/sites-available/ then symlink to sites-enabled/
# Then: certbot --nginx -d gameofclaw.duke-analytics.com

server {
    listen 80;
    server_name gameofclaw.duke-analytics.com;

    # Certbot will add the redirect to 443 here
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name gameofclaw.duke-analytics.com;

    # SSL — certbot will fill these in
    # ssl_certificate /etc/letsencrypt/live/gameofclaw.duke-analytics.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/gameofclaw.duke-analytics.com/privkey.pem;

    # ── Static frontend ──────────────────────────────────────────
    root /var/www/gameofclaw;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── WebSocket proxy → GM (mistralski) ────────────────────────
    location /ws/ {
        proxy_pass http://127.0.0.1:8899;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # ── API proxy → GM (mistralski) ──────────────────────────────
    location /api/ {
        proxy_pass http://127.0.0.1:8899;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_buffering off;
    }

    # ── Relay endpoints → backend-relay ──────────────────────────
    location /init_session {
        proxy_pass http://127.0.0.1:8001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /submit_news {
        proxy_pass http://127.0.0.1:8001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── Relay health check ───────────────────────────────────────
    location /health {
        proxy_pass http://127.0.0.1:8001;
        proxy_set_header Host $host;
    }
}
